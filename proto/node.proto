syntax = "proto3";

package meshcoverage;

option python_package = "meshcoverage.proto";

// Node's geographical position
message Position {
  double lat = 1;   // Latitude (WGS84)
  double lon = 2;   // Longitude (WGS84)
  double alt = 3;   // Altitude above sea level (metres)
}

// Antenna parameters associated with the node
message AntennaParams {
  float tx_power_dbm   = 1;  // Transmitter power (dBm)
  string type          = 2;  // Type: dipole, collinear, yagi, j-pole, etc.
  float gain_dbi       = 3;  // Antenna gain (dBi)
  float azimuth_deg    = 4;  // Pointing angle (0=North, degrees)
  float beamwidth_deg  = 5;  // Beam width (360 for omnidirectional)
  float gain_min_dbi   = 6;  // Minimum gain (dBi)
  float gain_max_dbi   = 7;  // Maximum gain (dBi)
  float gain_min_angle = 8;  // Minimum gain angle (degrees)
  float gain_max_angle = 9;  // Maximum gain angle (degrees)
  float elevation_deg  = 10; // Vertical tilt (positive = above horizon)
}

// Meshtastic modem preset with associated LoRa parameters
enum ModemPreset {
  SHORT_TURBO    = 0;
  SHORT_FAST     = 1;
  SHORT_SLOW     = 2;
  MEDIUM_FAST    = 3;  // Default
  MEDIUM_SLOW    = 4;
  LONG_FAST      = 5;
  LONG_MODERATE  = 6;
  LONG_SLOW      = 7;
  VERY_LONG_SLOW = 8;
}

// Meshtastic node with all parameters
message Node {
  string id              = 1;   // E.g. "!aabbccdd"
  string short_name      = 2;
  string long_name       = 3;
  string hardware_model  = 4;
  string firmware        = 5;
  Position position      = 6;
  float ground_height_m  = 7;   // Antenna height above ground (metres)
  uint32 frequency_mhz   = 8;   // 433, 868, 915
  ModemPreset modem_preset = 9;
  AntennaParams antenna  = 10;
  string last_seen       = 11;  // ISO8601 timestamp
  string notes           = 12;
  bool data_complete     = 13;  // True if has position + frequency + antenna
}

// Collection of nodes
message NodeDatabase {
  repeated Node nodes = 1;
  string updated_at   = 2;
}
