import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

syntax = "proto3";

package meshcoverage;

option python_package = "meshcoverage.proto";

// Node's geographical position
message Position {
  double lat = 1;   // Latitude (WGS84)
  double lon = 2;   // Longitude (WGS84)
  double alt = 3;   // Altitude above sea level (metres)
}

// Antenna parameters associated with the node
message AntennaParams {
  float tx_power_dbm   = 1;  // Transmitter power (dBm)
  string type          = 2;  // Type: dipole, collinear, yagi, j-pole, etc.
  float gain_dbi       = 3;  // Antenna gain (dBi)
  float azimuth_deg    = 4;  // Pointing angle (0=North, degrees)
  float beamwidth_deg  = 5;  // Beam width (360 for omnidirectional)
  float gain_min_dbi   = 6;  // Minimum gain (dBi)
  float gain_max_dbi   = 7;  // Maximum gain (dBi)
  float gain_min_angle = 8;  // Minimum gain angle (degrees)
  float gain_max_angle = 9;  // Maximum gain angle (degrees)
  float elevation_deg  = 10; // Vertical tilt (positive = above horizon)
}

// Meshtastic modem preset with associated LoRa parameters
enum ModemPreset {
  SHORT_TURBO    = 0;
  SHORT_FAST     = 1;
  SHORT_SLOW     = 2;
  MEDIUM_FAST    = 3;  // Default
  MEDIUM_SLOW    = 4;
  LONG_FAST      = 5;
  LONG_MODERATE  = 6;
  LONG_SLOW      = 7;
  VERY_LONG_SLOW = 8;
}

enum Role {
      CLIENT = 0;
      CLIENT_MUTE = 1;
      ROUTER = 2;
      ROUTER_CLIENT = 3 [deprecated = true];
      REPEATER = 4 [deprecated = true];
      TRACKER = 5;
      SENSOR = 6;
      TAK = 7;
      CLIENT_HIDDEN = 8;
      LOST_AND_FOUND = 9;
      TAK_TRACKER = 10;
      ROUTER_LATE = 11;
      CLIENT_BASE = 12;
    }

// Meshtastic node with all parameters
message Node {
  string id              = 1;   // E.g. "!aabbccdd"
  string short_name      = 2;
  string long_name       = 3;
  Role role              = 4;   // ONLY ROUTER, ROUTER_LATE and CLIENT_BASE should be considered for automatic coverage calculations
  string hardware_model  = 5;
  string firmware        = 6;
  Position position      = 7;
  float ground_height_m  = 8;   // Antenna height above ground (metres)
  uint32 frequency_mhz   = 9;   // 433, 868, 915
  ModemPreset modem_preset = 10;
  AntennaParams antenna  = 11;
  string last_seen       = 12;  // ISO8601 timestamp
  string notes           = 13;
  bool data_complete     = 14;  // True if has position + frequency + antenna
}

// Collection of nodes
message NodeDatabase {
  repeated Node nodes = 1;
  string updated_at   = 2;
}
