syntax = "proto3";

package meshcoverage;

option python_package = "meshcoverage.proto";

// Single calculated coverage point
message CoveragePoint {
  double lat           = 1;  // Latitude
  double lon           = 2;  // Longitude
  float link_budget_db = 3;  // Link budget margin (dB)
  float distance_km    = 4;  // Distance from node (km)
  bool  los            = 5;  // Line of sight available
  bool  fresnel_ok     = 6;  // First Fresnel zone clear
}

// Coverage calculation metadata for a node
message CoverageMetadata {
  string node_id       = 1;
  string computed_at   = 2;  // ISO8601 timestamp
  uint32 frequency_mhz = 3;
  string modem_preset  = 4;
  float  erp_dbm       = 5;  // Calculated ERP
  bool   erp_warning   = 6;  // True if ERP > +27 dBm
  float  max_range_km  = 7;  // Maximum theoretical distance (free LOS)
  float  sensitivity_dbm = 8;
  uint32 point_count   = 9;  // Number of covered points
  string dem_files     = 10; // DEM files used (CSV)
}

// Aggregated heatmap for frequency + preset
message HeatmapMetadata {
  uint32 frequency_mhz = 1;
  string modem_preset  = 2;
  string generated_at  = 3;
  uint32 node_count    = 4;  // Nodes included in heatmap
  string geojson_path  = 5;  // GeoJSON file path
}
